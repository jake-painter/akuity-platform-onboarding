apiVersion: argocd.akuity.io/v1alpha1
kind: ArgoCD
metadata:
  name: my-argocd-instance
spec:
  description: "Argo CD Instance for Kargo Quickstart"
  instanceSpec:
    akuityIntelligenceExtension:      # enable Akuity Intelligence
      enabled: true
      allowedUsernames: ["*"]
      allowedGroups: ["*"]
      aiSupportEngineerEnabled: true
    kubeVisionConfig:                 # enable CVE Scanning 
      cveScanConfig:
        scanEnabled: true
        rescanInterval: "8h"
  version: v3.4.3-ak.92